services:
  - type: web
    name: mafia-api
    runtime: node
    buildCommand: npm install && npm run build -w server
    startCommand: npm run start -w server
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: CLIENT_ORIGIN
        sync: false
      - key: USER_CREDENTIALS
        sync: false
      - key: DEFAULT_ROOM_ID
        value: main
