# fly.toml app configuration file generated for mafia-bltyzw on 2026-06-29T14:09:56Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mafia-bltyzw'
primary_region = 'fra'

[build]
  dockerfile = 'server/Dockerfile'

[env]
  PORT = '3001'

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '5s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
